<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="React, JSX, bileşenler, state, formlar ve hooks üzerine etkileşimli dersler; bilgi sınamaları, alıştırmalar ve canlı kod ile pekiştirme. Öğrenme rehberinde mimari ve içerik özeti."
    />
    <meta name="theme-color" content="#16a34a" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="React Akademi" />
    <title>React Akademi</title>
    <script>
      try {
        var t = localStorage.getItem('react-akademi:theme')
        var dark =
          t === 'dark' ||
          (t !== 'light' &&
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
